name: CI

# Runs the same validation the deploy workflow runs (format + lint +
# type-check + duplication, then a production build) but on pull requests
# instead of post-merge to main, so problems surface before the PR lands.
# Skips deploy.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# A new push to a PR cancels the in-progress run for that same PR — we
# only care about the latest commit's status, no point burning minutes
# on superseded work.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Install deps
        # Match deploy.yml: setup-vp doesn't put pnpm on PATH, so go
        # through `vp install` and skip optionalDependencies (playwright,
        # only needed by the crawler) via the env var pnpm reads.
        run: vp install
        env:
          PNPM_CONFIG_OPTIONAL: "false"

      - name: Validate (format + lint + type-check + duplication)
        run: vp run check

      - name: Build
        run: vp build
        env:
          VITE_GH_PAGES: "1"

  a11y:
    # WCAG smoke check: builds the production bundle, serves it via
    # `vp preview`, and runs axe-core/playwright + pa11y-ci against the
    # routes listed in scripts/a11y/routes.mjs / .pa11yci.json. Independent
    # of `check` so a lint failure doesn't mask a11y regressions (and vice
    # versa).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Install deps (with optional Playwright)
        # Skip puppeteer's postinstall Chrome download: on the runner it leaves
        # a partial cache (folder present, executable missing) that pa11y-ci
        # can't launch. pa11y uses the runner's preinstalled Chrome instead.
        run: vp install
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"

      - name: Install Playwright Chromium
        run: vp exec playwright install --with-deps chromium

      - name: Build
        run: vp build

      - name: Run a11y suite (axe-core + Pa11y)
        # ubuntu-latest ships Google Chrome stable; point pa11y/puppeteer-core
        # at it so the scan is deterministic and independent of puppeteer's
        # managed download.
        run: vp run a11y
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
