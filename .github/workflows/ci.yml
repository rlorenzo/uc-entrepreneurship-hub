name: CI

# Runs the same validation the deploy workflow runs (format + lint +
# type-check + duplication, then a production build) but on pull requests
# instead of post-merge to main, so problems surface before the PR lands.
# Skips deploy.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# A new push to a PR cancels the in-progress run for that same PR — we
# only care about the latest commit's status, no point burning minutes
# on superseded work.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Install deps
        # Match deploy.yml: setup-vp doesn't put pnpm on PATH, so go
        # through `vp install` and skip optionalDependencies (playwright,
        # only needed by the crawler) via the env var pnpm reads.
        run: vp install
        env:
          PNPM_CONFIG_OPTIONAL: "false"

      - name: Validate (format + lint + type-check + duplication)
        run: vp run check

      - name: Build
        run: vp build
        env:
          VITE_GH_PAGES: "1"

  a11y:
    # WCAG smoke check: builds the production bundle, serves it via
    # `vp preview`, and runs axe-core/playwright + pa11y-ci against the
    # routes listed in scripts/a11y/routes.mjs / .pa11yci.json. Independent
    # of `check` so a lint failure doesn't mask a11y regressions (and vice
    # versa).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Install deps (with optional Playwright)
        run: vp install

      - name: Install Playwright Chromium
        run: vp exec playwright install --with-deps chromium

      - name: Install Puppeteer Chrome (for pa11y-ci)
        # pa11y-ci uses puppeteer-core (no bundled Chrome) and looks for the
        # exact Chrome build puppeteer-core pins, under ~/.cache/puppeteer.
        # setup-vp's pnpm cache restores node_modules but not that user-cache
        # directory, and puppeteer's own install.mjs can silently skip the
        # download — so install the pinned build explicitly via
        # @puppeteer/browsers (a transitive dep already in the store).
        run: |
          REV=$(ls node_modules/.pnpm/puppeteer-core@*/node_modules/puppeteer-core/lib/cjs/puppeteer/revisions.js | head -1)
          CHROME_VER=$(node -e "process.stdout.write(require(process.argv[1]).PUPPETEER_REVISIONS.chrome)" "$REV")
          CLI=$(ls node_modules/.pnpm/@puppeteer+browsers@*/node_modules/@puppeteer/browsers/lib/cjs/main-cli.js | head -1)
          echo "Installing Chrome $CHROME_VER for puppeteer-core (pa11y-ci)"
          node "$CLI" install "chrome@$CHROME_VER" --path "$HOME/.cache/puppeteer"

      - name: Build
        run: vp build

      - name: Run a11y suite (axe-core + Pa11y)
        run: vp run a11y
