name: Weekly data refresh

# Crawl every UC innovation hub once a week and commit the regenerated
# program catalog and news feed. The deploy workflow then redeploys the
# site on the resulting push to main.
#
# Schedule: 13:00 UTC every Sunday (≈ 06:00 PT, before West Coast traffic).
# Use the workflow_dispatch trigger to refresh on demand from the Actions tab.

on:
  schedule:
    - cron: "0 13 * * 0"
  workflow_dispatch:
    inputs:
      campus:
        description: "Comma-separated campus ids (default: all)"
        required: false
        default: ""

permissions:
  contents: write
  # actions: write lets us dispatch deploy.yml at the end of the run.
  # A `git push` made with the default GITHUB_TOKEN does *not* trigger
  # downstream workflows (GitHub's anti-loop guard), so we have to
  # explicitly fire a workflow_dispatch — which is the documented
  # exception to that guard.
  actions: write

concurrency:
  group: weekly-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      # Official Vite+ CI action — installs vp, sets up Node, picks the
      # package manager from `packageManager` in package.json, and caches
      # the install. https://viteplus.dev/guide/ci
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          node-version: "24"
          cache: true

      - name: Install deps
        run: vp install

      - name: Install Playwright browsers
        # chromium is the headless baseline; real Chrome backs the bot-block
        # fallback (scripts/crawl/playwright.ts) — its genuine fingerprint is
        # what clears Akamai on ucmerced.edu while the UA exception is pending.
        run: vp exec playwright install --with-deps chromium chrome

      - name: Refresh data
        env:
          CAMPUS_INPUT: ${{ github.event.inputs.campus }}
          # UA UC Merced's WAF allowlists for us; kept out of the public repo
          # (see scripts/crawl/news/rss.ts). Empty when the secret is unset,
          # which falls back to the default crawler UA — Merced then 403s and
          # recovers via the headed-Chrome retry.
          MERCED_USER_AGENT: ${{ secrets.MERCED_USER_AGENT }}
        # xvfb-run gives the headed-Chrome bot-block fallback a display on the
        # headless runner; sites that never trip the fallback stay fully
        # headless. (xvfb itself ships with Playwright's --with-deps.) The
        # explicit screen matters: xvfb's 640x480x8 default is smaller than
        # our 1440x900 viewport and 8-bit color is a bot-scented fingerprint;
        # 1920x1080x24 is the shape the sister a11y scan validated on a
        # GitHub runner against ucmerced.edu.
        run: |
          xrun() { xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" "$@"; }
          if [ -n "${CAMPUS_INPUT}" ]; then
            # Validate the dispatch input before letting it reach a shell.
            # Anything outside lowercase letters / commas is rejected so a
            # crafted input like "berkeley; rm -rf …" can't run.
            if ! printf '%s' "${CAMPUS_INPUT}" | grep -Eq '^[a-z,]+$'; then
              echo "Invalid --campus input: ${CAMPUS_INPUT}" >&2
              exit 1
            fi
            xrun vp run crawl -- --campus="${CAMPUS_INPUT}"
            vp run build-data
            xrun vp run crawl:news -- --campus="${CAMPUS_INPUT}"
            vp run build-news-data
          else
            xrun vp run refresh-data
            xrun vp run refresh-news
          fi

      # Gate the auto-commit on the data-integrity tests (dangling campus/type
      # ids, duplicate routing keys, unsafe URLs). A crawl that produced a
      # contract-violating catalog must fail here, not deploy unattended.
      - name: Test refreshed catalog (unit + data integrity)
        run: vp test

      - name: Commit refreshed catalog
        id: commit
        run: |
          git config user.name "uc-hub-bot"
          git config user.email "uc-hub-bot@users.noreply.github.com"
          git add data/crawled data/news src/data/programs.generated.ts src/data/news.generated.ts
          if git diff --cached --quiet; then
            echo "No changes from this crawl."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(data): weekly refresh ($(date -u +%Y-%m-%d))"
          # main may have moved during the (long) crawl; rebase and retry so a
          # mid-crawl merge to main doesn't reject the push non-fast-forward
          # and discard the whole week's refresh.
          for attempt in 1 2 3; do
            if git push; then
              break
            fi
            if [ "$attempt" = 3 ]; then
              echo "git push failed after 3 attempts" >&2
              exit 1
            fi
            git pull --rebase origin main
          done
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # Pushes made with the default GITHUB_TOKEN don't trigger other
      # workflows, so deploy.yml would never see this commit on its own.
      # workflow_dispatch is the documented exception — explicitly fire
      # the deploy when we actually committed something.
      - name: Trigger deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main
