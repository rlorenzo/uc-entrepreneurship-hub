name: Submit a program
description: Suggest an entrepreneurship program to add to the UC Entrepreneurship Hub.
title: "[Program] <program name>"
labels:
  - program submission
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping grow the catalog! Fill in what you know — only a few
        fields are required. A maintainer will verify the details against the
        program’s own site before it’s published, so a source link helps a lot.

        Browse what’s already listed: https://rlorenzo.github.io/uc-entrepreneurship-hub/
  - type: input
    id: name
    attributes:
      label: Program name
      placeholder: e.g. Berkeley SkyDeck
    validations:
      required: true
  - type: dropdown
    id: campus
    attributes:
      label: Campus
      description: Which UC campus runs this program?
      options:
        - UC Berkeley
        - UC Davis
        - UC Merced
        - UC Santa Cruz
        - UC San Francisco
        - UC Santa Barbara
        - UCLA
        - UC Irvine
        - UC Riverside
        - UC San Diego
        - Cross-campus / system-wide
        - Other / not sure
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: Program type
      options:
        - Incubator
        - Accelerator
        - Certificate
        - Funding
        - Competition
        - Maker space
        - Mentorship
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Short description
      description: One or two sentences, the way it should read on a card.
      placeholder: A six-month accelerator backing growth-stage UC startups with funding and mentorship.
    validations:
      required: true
  - type: textarea
    id: long_description
    attributes:
      label: Longer description (optional)
      description: A fuller paragraph for the program’s detail page.
    validations:
      required: false
  - type: input
    id: website
    attributes:
      label: Program website
      placeholder: https://…
    validations:
      required: false
  - type: input
    id: application_link
    attributes:
      label: Application link (if different from the website)
      placeholder: https://…
    validations:
      required: false
  - type: input
    id: deadline
    attributes:
      label: Application deadline
      description: A date, “Rolling”, or “See program site”.
      placeholder: e.g. Mar 1, 2026
    validations:
      required: false
  - type: input
    id: funding
    attributes:
      label: Funding offered
      placeholder: e.g. $200,000 investment / Up to $25K grant / Course credit
    validations:
      required: false
  - type: dropdown
    id: stage
    attributes:
      label: Stage it best fits
      options:
        - Idea
        - Prototype
        - Pre-seed
        - Scaling
        - Not sure / varies
    validations:
      required: false
  - type: checkboxes
    id: eligibility
    attributes:
      label: Who is eligible?
      options:
        - label: Undergrad
        - label: Graduate
        - label: Alumni
        - label: Faculty
        - label: Postdoc
        - label: Open to public
  - type: checkboxes
    id: industries
    attributes:
      label: Focus areas
      description: Check any that apply.
      options:
        - label: AI / ML
        - label: Biotech
        - label: Climate
        - label: Consumer
        - label: Hardware
        - label: Health
        - label: Fintech
        - label: AgTech
        - label: Media
        - label: EdTech
        - label: Robotics
        - label: Energy
  - type: input
    id: cohort_size
    attributes:
      label: Cohort size (optional)
      placeholder: e.g. 25
    validations:
      required: false
  - type: input
    id: source
    attributes:
      label: Source to verify against
      description: A page where these details can be confirmed (helps us publish faster).
      placeholder: https://…
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Anything else?
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: This is a real UC entrepreneurship program and the details are accurate to the best of my knowledge.
          required: true
